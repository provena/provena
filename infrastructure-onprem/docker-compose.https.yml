# Override to use Caddy as the only entry point (HTTPS). Run:
#   docker compose -f infrastructure-onprem/docker-compose.yml -f infrastructure-onprem/docker-compose.https.yml --profile https up -d
# Set CADDY_DOMAIN in .env (e.g. rrap1.it.csiro.au). Set VITE_APP_BASE_URL=https://$CADDY_DOMAIN and rebuild UIs.
# Backend services no longer expose ports; all traffic goes through Caddy on 80, 443, 3001, 3002, 3003, 3004, 8001-8004, 8006, 8007, 8180.

services:
  keycloak:
    ports: []
  registry-api:
    ports: []
  auth-api:
    ports: []
  data-store-api:
    ports: []
  search-api:
    ports: []
  job-api:
    ports: []
  prov-api:
    ports: []
  registry-ui:
    ports: []
  data-store-ui:
    ports: []
  prov-ui:
    ports: []
  landing-portal-ui:
    ports: []
