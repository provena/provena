# Override to use Caddy as the only entry point (HTTPS). Run:
#   docker compose -f infrastructure-onprem/docker-compose.yml -f infrastructure-onprem/docker-compose.https.yml --profile https up -d
# Set CADDY_DOMAIN in .env (e.g. rrap1.it.csiro.au). Set VITE_APP_BASE_URL=https://$CADDY_DOMAIN and rebuild UIs.
# Backend services have their ports removed so Caddy can bind them. Keycloak is behind Caddy on 8443 (HTTPS).

services:
  keycloak:
    ports: []
  registry-api:
    ports: []
  auth-api:
    ports: []
  data-store-api:
    ports: []
  search-api:
    ports: []
  job-api:
    ports: []
  prov-api:
    ports: []
  registry-ui:
    ports: []
  data-store-ui:
    ports: []
  prov-ui:
    ports: []
  landing-portal-ui:
    ports: []
  caddy:
    image: caddy:2-alpine
    environment:
      CADDY_DOMAIN: ${CADDY_DOMAIN:-localhost}
    ports:
      - "80:80"
      - "443:443"
      - "3001:3001"
      - "3002:3002"
      - "3003:3003"
      - "3004:3004"
      - "8001:8001"
      - "8002:8002"
      - "8003:8003"
      - "8004:8004"
      - "8006:8006"
      - "8007:8007"
      - "8443:8443"
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
    depends_on:
      - landing-portal-ui
      - registry-ui
      - data-store-ui
      - prov-ui
      - keycloak
      - registry-api
      - auth-api
      - data-store-api
      - search-api
      - job-api
      - prov-api
    profiles:
      - https

volumes:
  caddy_data:
